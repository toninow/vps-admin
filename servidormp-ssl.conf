<IfModule mod_ssl.c>
<VirtualHost *:443>
	ServerName www.servidormp.com
	ServerAlias servidormp.com
	ServerAdmin webmaster@localhost
	DocumentRoot /var/www/html/mp-admin-vps/public

	# Laravel MP Admin VPS (raíz del sitio)
	<Directory /var/www/html/mp-admin-vps/public>
		Options -Indexes +FollowSymLinks
		AllowOverride All
		Require all granted
	</Directory>

	# Portal login (para redirección desde /mpsfp sin cookie)
	Alias /login.php /var/www/html/login.php
	<Directory /var/www/html>
		Options -Indexes
		AllowOverride None
		Require all granted
	</Directory>

	RewriteEngine On

	# /mp-admin-vps -> raíz (panel Laravel)
	RewriteRule ^/mp-admin-vps/?$ / [R=302,L]

	# Redirecciones raíz -> /mpsfp/ (solo rutas concretas; / queda para Laravel)
	RewriteRule ^/results/?$ /mpsfp/results [R=302,L]
	RewriteRule ^/upload/?$ /mpsfp/upload [R=302,L]
	RewriteRule ^/imports/(.*)$ /mpsfp/imports/$1 [R=302,L]

	# Proteger /mpsfp/: solo accesible con sesión del portal (cookie portal_auth)
	RewriteCond %{REQUEST_URI} ^/mpsfp/ [NC]
	RewriteCond %{REQUEST_URI} !^/mpsfp/api/ [NC]
	# Evitar doble login: si el usuario ya está autenticado en el admin Laravel
	# (cookie de sesión), no redirigimos al login del portal.
	RewriteCond %{HTTP:Cookie} !portal_auth= [NC]
	RewriteCond %{HTTP:Cookie} !mp_admin_vps_session= [NC]
	RewriteRule ^/mpsfp(/.*)?$ /login.php?redirect=%{REQUEST_URI} [L,QSA,R=302]

	# API MPSFP: proxy al backend en puerto 8000
	ProxyPreserveHost On
	ProxyPass /mpsfp/api/ http://127.0.0.1:8000/
	ProxyPassReverse /mpsfp/api/ http://127.0.0.1:8000/

	# SPA MPSFP (frontend construido)
	Alias /mpsfp /home/antonio/MPSFP/frontend/dist
	<Directory /home/antonio/MPSFP/frontend/dist>
		Options -Indexes +FollowSymLinks
		AllowOverride None
		Require all granted
		RewriteEngine On
		RewriteBase /mpsfp/
		RewriteCond %{REQUEST_FILENAME} !-f
		RewriteCond %{REQUEST_FILENAME} !-d
		# Rutas SPA -> index.html (assets reales siguen sirviéndose como ficheros)
		RewriteRule ^ index.html [L]
	</Directory>

	# Imágenes procesadas MPSFP
	Alias /images-prestashop /home/antonio/MPSFP/backend/data/processed_images
	<Directory /home/antonio/MPSFP/backend/data/processed_images>
		Options -Indexes +FollowSymLinks
		Require all granted
	</Directory>

	# Bloquear acceso web a datos sensibles
	<Directory /var/www/html/data>
		Require all denied
	</Directory>

	# Cabeceras de seguridad
	Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
	Header always set X-Frame-Options "SAMEORIGIN"
	Header always set X-Content-Type-Options "nosniff"
	Header always set Referrer-Policy "strict-origin-when-cross-origin"

	ErrorLog ${APACHE_LOG_DIR}/error.log
	CustomLog ${APACHE_LOG_DIR}/access.log combined

	SSLEngine on
	SSLCertificateFile /etc/letsencrypt/live/servidormp.com/fullchain.pem
	SSLCertificateKeyFile /etc/letsencrypt/live/servidormp.com/privkey.pem
	Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
